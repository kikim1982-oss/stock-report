    function parseNum(str) {
      if (!str) return 0;
      return parseFloat(str.replace(/,/g, ''));
    }
    function toEok(str) {
      return Math.round(parseNum(str) / 100000000);
    }
    function formatEok(str) {
      return toEok(str).toLocaleString();
    }
    function calcChange(cur, prev) {
      const c = parseNum(cur);
      const p = parseNum(prev);
      if (p === 0) return null;
      return ((c - p) / Math.abs(p)) * 100;
    }

            <thead>
              <tr className="border-b border-[#2a2a3d]">
                <th className="text-left py-3 px-4 text-gray-400 font-medium w-48">계정과목</th>
                {periods.map(p => (
                  <th key={p.key} className="text-right py-3 px-4 text-gray-400 font-medium">{p.label}</th>
                ))}
                <th className="text-right py-3 px-4 text-gray-400 font-medium w-20">전기대비</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((row, i) => {
                const change = calcChange(row[latest], row[prev]);
                return (
                  <tr key={i} className={`border-b border-[#1e1e30] hover:bg-[#252540]/50 transition-colors ${row.bold ? 'bg-[#12121f]' : ''}`}>
                    <td className={`py-2.5 px-4 ${row.bold ? 'text-white font-semibold' : 'text-gray-300'}`}
                        style={{ paddingLeft: `${1 + row.indent * 1.5}rem` }}>
                      {row.name}
                    </td>
                    {periods.map(p => {
                      const neg = parseNum(row[p.key]) < 0;
                      return (
                        <td key={p.key} className={`py-2.5 px-4 text-right mono text-sm ${row.bold ? 'font-semibold' : ''} ${neg ? 'text-red-400' : p.key === latest ? 'text-white' : 'text-gray-400'}`}>
                          {formatEok(row[p.key])}
                        </td>
                      );
                    })}
                    <td className={`py-2.5 px-4 text-right mono text-xs ${change === null ? 'text-gray-600' : change >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                      {change !== null ? `${change >= 0 ? '+' : ''}${change.toFixed(1)}%` : '-'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div className="text-right text-gray-600 text-xs mt-2 px-4">단위: 억원 (KRW)</div>
        </div>
      );
    }

    function ChartSection({ data, labels, keys }) {
      const chartRef1 = useRef(null);
      const chartRef2 = useRef(null);
      const chart1 = useRef(null);
      const chart2 = useRef(null);

      useEffect(() => {
        const bs = data.BS;
        const is = data.IS;

        const assets = bs.find(r => r.name === '자산총계');
        const liabilities = bs.find(r => r.name === '부채총계');
        const equity = bs.find(r => r.name === '자본총계');

        if (chart1.current) chart1.current.destroy();
        chart1.current = new Chart(chartRef1.current, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: '자산총계',
                data: keys.map(k => toEok(assets[k])),
                backgroundColor: 'rgba(99, 102, 241, 0.7)',
                borderColor: 'rgba(99, 102, 241, 1)',
                borderWidth: 1, borderRadius: 4,
              },
              {
                label: '부채총계',
                data: keys.map(k => toEok(liabilities[k])),
                backgroundColor: 'rgba(239, 68, 68, 0.7)',
                borderColor: 'rgba(239, 68, 68, 1)',
                borderWidth: 1, borderRadius: 4,
              },
              {
                label: '자본총계',
                data: keys.map(k => toEok(equity[k])),
                backgroundColor: 'rgba(16, 185, 129, 0.7)',
                borderColor: 'rgba(16, 185, 129, 1)',
                borderWidth: 1, borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: '#9ca3af', font: { family: 'Noto Sans KR' } } },
              tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()}억원` } },
            },
            scales: {
              x: { ticks: { color: '#6b7280' }, grid: { color: '#1e1e30' } },
              y: { ticks: { color: '#6b7280', callback: v => v.toLocaleString() + '억' }, grid: { color: '#1e1e30' } },
            },
          },
        });

        const revenue = is.find(r => r.name === '매출액');
        const opIncome = is.find(r => r.name === '영업이익');
        const netIncome = is.find(r => r.name === '당기순이익(손실)');

        if (chart2.current) chart2.current.destroy();
        chart2.current = new Chart(chartRef2.current, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: '매출액',
                data: keys.map(k => toEok(revenue[k])),
                borderColor: 'rgba(99, 102, 241, 1)', backgroundColor: 'rgba(99, 102, 241, 0.1)',
                fill: true, tension: 0.3, pointRadius: 5, pointHoverRadius: 7,
              },
              {
                label: '영업이익',
                data: keys.map(k => toEok(opIncome[k])),
                borderColor: 'rgba(245, 158, 11, 1)', backgroundColor: 'rgba(245, 158, 11, 0.1)',
                fill: false, tension: 0.3, pointRadius: 5, pointHoverRadius: 7,
              },
              {
                label: '당기순이익',
                data: keys.map(k => toEok(netIncome[k])),
                borderColor: 'rgba(16, 185, 129, 1)', backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: false, tension: 0.3, pointRadius: 5, pointHoverRadius: 7, borderDash: [5, 5],
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: '#9ca3af', font: { family: 'Noto Sans KR' } } },
              tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()}억원` } },
            },
            scales: {
              x: { ticks: { color: '#6b7280' }, grid: { color: '#1e1e30' } },
              y: { ticks: { color: '#6b7280', callback: v => v.toLocaleString() + '억' }, grid: { color: '#1e1e30' } },
            },
          },
        });

        return () => {
          if (chart1.current) chart1.current.destroy();
          if (chart2.current) chart2.current.destroy();
        };
      }, [data, labels, keys]);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <Card title="재무상태 추이" subtitle="자산·부채·자본 (억원)">
            <canvas ref={chartRef1}></canvas>
          </Card>
          <Card title="손익 추이" subtitle="매출액·영업이익·당기순이익 (억원)">
            <canvas ref={chartRef2}></canvas>
          </Card>
        </div>
      );
    }

    function RatioAnalysis({ data, keys, yearLabels }) {
      const bs = data.BS;
      const is = data.IS;

      const get = (arr, name) => arr.find(r => r.name === name);
      const val = (row, key) => parseNum(row[key]);

      const assets = get(bs, '자산총계');
      const liabilities = get(bs, '부채총계');
      const equity = get(bs, '자본총계');
      const curAssets = get(bs, '유동자산');
      const curLiab = get(bs, '유동부채');
      const revenue = get(is, '매출액');
      const opIncome = get(is, '영업이익');
      const netIncome = get(is, '당기순이익(손실)');

      const displayKeys = [...keys].reverse();
      const displayLabels = [...yearLabels].reverse();

      const ratios = [
        {
          name: '부채비율',
          desc: '부채총계 / 자본총계 × 100',
          values: displayKeys.map(y => ((val(liabilities, y) / val(equity, y)) * 100).toFixed(1)),
          unit: '%',
        },
        {
          name: '유동비율',
          desc: '유동자산 / 유동부채 × 100',
          values: displayKeys.map(y => ((val(curAssets, y) / val(curLiab, y)) * 100).toFixed(1)),
          unit: '%',
        },
        {
          name: '영업이익률',
          desc: '영업이익 / 매출액 × 100',
          values: displayKeys.map(y => ((val(opIncome, y) / val(revenue, y)) * 100).toFixed(1)),
          unit: '%',
        },
        {
          name: '순이익률',
          desc: '당기순이익 / 매출액 × 100',
          values: displayKeys.map(y => ((val(netIncome, y) / val(revenue, y)) * 100).toFixed(1)),
          unit: '%',
        },
        {
          name: 'ROE',
          desc: '당기순이익 / 자본총계 × 100',
          values: displayKeys.map(y => ((val(netIncome, y) / val(equity, y)) * 100).toFixed(1)),
          unit: '%',
        },
        {
          name: 'ROA',
          desc: '당기순이익 / 자산총계 × 100',
          values: displayKeys.map(y => ((val(netIncome, y) / val(assets, y)) * 100).toFixed(1)),
          unit: '%',
        },
      ];

      return (
        <Card title="주요 재무비율" subtitle="연결재무제표 기준" className="mb-6">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-[#2a2a3d]">
                  <th className="text-left py-3 px-4 text-gray-400 font-medium">지표</th>
                  <th className="text-left py-3 px-4 text-gray-500 font-normal text-xs hidden sm:table-cell">산식</th>
                  {displayLabels.map(y => (
                    <th key={y} className="text-right py-3 px-4 text-gray-400 font-medium">{y}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {ratios.map((r, i) => (
                  <tr key={i} className="border-b border-[#1e1e30] hover:bg-[#252540]/50 transition-colors">
                    <td className="py-2.5 px-4 text-white font-medium">{r.name}</td>
                    <td className="py-2.5 px-4 text-gray-600 text-xs hidden sm:table-cell">{r.desc}</td>
                    {r.values.map((v, j) => {
                      const neg = parseFloat(v) < 0;
                      return (
                        <td key={j} className={`py-2.5 px-4 text-right mono ${j === 0 ? 'text-white font-semibold' : 'text-gray-400'} ${neg ? 'text-red-400' : ''}`}>
                          {v}{r.unit}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      );
    }

    // ========================================
    // App
    // ========================================
    function App() {
      const [fsType, setFsType] = useState('CFS');
      const [periodType, setPeriodType] = useState('annual');
      const [tableType, setTableType] = useState('BS');

      const isAnnual = periodType === 'annual';
      const data = useMemo(() => {
        if (fsType === 'CFS') return isAnnual ? CFS_ANNUAL : CFS_QUARTERLY;
        return isAnnual ? OFS_ANNUAL : OFS_QUARTERLY;
      }, [fsType, isAnnual]);

      const keys = isAnnual ? ANNUAL_KEYS : QUARTERLY_KEYS;
      const chartLabels = isAnnual ? ANNUAL_CHART_LABELS : QUARTERLY_CHART_LABELS;
      const tablePeriods = isAnnual
        ? (tableType === 'BS' ? ANNUAL_PERIODS_BS : ANNUAL_PERIODS_IS)
        : QUARTERLY_PERIODS;

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          <CompanyHeader />

          {/* 탭: 연결/별도 + 연간/분기 */}
          <div className="flex flex-wrap items-center gap-3 mb-6">
            <span className="text-gray-500 text-sm">재무제표:</span>
            <TabButton active={fsType === 'CFS'} onClick={() => setFsType('CFS')}>연결</TabButton>
            <TabButton active={fsType === 'OFS'} onClick={() => setFsType('OFS')}>별도</TabButton>
            <span className="text-gray-700 mx-1">|</span>
            <span className="text-gray-500 text-sm">기간:</span>
            <TabButton active={periodType === 'annual'} onClick={() => setPeriodType('annual')}>연간</TabButton>
            <TabButton active={periodType === 'quarterly'} onClick={() => setPeriodType('quarterly')}>분기 (2025)</TabButton>
          </div>

          <SummaryStats data={data} keys={keys} />

          <ChartSection data={data} labels={chartLabels} keys={keys} />

          {fsType === 'CFS' && isAnnual && (
            <RatioAnalysis data={data} keys={keys} yearLabels={ANNUAL_CHART_LABELS} />
          )}

          <Card
            title={tableType === 'BS' ? '재무상태표' : '손익계산서'}
            subtitle={`${fsType === 'CFS' ? '연결' : '별도'}재무제표 · ${isAnnual ? '사업보고서' : '2025년 분기보고서'} 기준`}
            headerRight={
              <div className="flex gap-2">
                <TabButton active={tableType === 'BS'} onClick={() => setTableType('BS')}>재무상태표</TabButton>
                <TabButton active={tableType === 'IS'} onClick={() => setTableType('IS')}>손익계산서</TabButton>
              </div>
            }
          >
            <FinancialTable data={data} type={tableType} periods={tablePeriods} keys={keys} />
          </Card>

          <div className="text-center mt-8 text-gray-600 text-xs space-y-1">
            <p>출처: DART 전자공시시스템 (dart.fss.or.kr) · 사업보고서/분기보고서 요약재무제표</p>
            <p>본 자료는 참고용이며, 투자 판단의 근거로 사용될 수 없습니다.</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
